name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps (incl. dev)
        run: uv sync --all-groups
      - name: Lint
        run: make check
      - name: Test (in-process FastAPI TestClient)
        run: make test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: chapkit-simple-multistep-template:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke check container boots and serves /health
        run: |
          docker run -d --name chapkit-ci -p 8000:8000 chapkit-simple-multistep-template:ci
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:8000/health | grep -q '"healthy"'; then
              echo "Service healthy after ${i} attempt(s)"
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8000/api/v1/info
      - name: Container logs on failure
        if: failure()
        run: docker logs chapkit-ci
      - name: Stop container
        if: always()
        run: docker rm -f chapkit-ci
